  /finance/appprofile/:
    get:
      operationId: finance_appprofile_retrieve
      description: Retrieve profile settings. Snapshot totals are available on the
        snapshot route.
      summary: Retrieve app profile
      tags:
      - App Profiles
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppProfileGet'
          description: ''
    post:
      operationId: finance_appprofile_create
      description: App profiles are auto-created alongside users; manual creation
        is disabled.
      summary: Not allowed
      tags:
      - App Profiles
      security:
      - jwtAuth: []
      - {}
      responses:
        '403':
          description: No response body
    put:
      operationId: finance_appprofile_update
      description: Only partial updates are supported on this resource.
      summary: Not allowed
      tags:
      - App Profiles
      security:
      - jwtAuth: []
      - {}
      responses:
        '405':
          description: No response body
    patch:
      operationId: finance_appprofile_partial_update
      description: |-
        Update mutable profile settings (for example, spend accounts/base currency).
        The reserved `unknown` source cannot be selected as a spend account.
      summary: Update app profile
      tags:
      - App Profiles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAppProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAppProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAppProfileUpdate'
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppProfileUpdate'
          description: ''
        '403':
          description: No response body
    delete:
      operationId: finance_appprofile_destroy
      description: Profiles are lifecycle-managed with users; delete the user account
        instead.
      summary: Not allowed
      tags:
      - App Profiles
      security:
      - jwtAuth: []
      - {}
      responses:
        '501':
          description: No response body
