components:
  schemas:
    AppProfileGet:
      type: object
      properties:
        spend_accounts:
          type: array
          items:
            type: string
            maxLength: 50
        base_currency:
          type: string
          maxLength: 3
        timezone:
          type: string
          maxLength: 64
        start_of_week:
          type: integer
      required:
      - base_currency
      - spend_accounts
      - start_of_week
      - timezone
    AppProfileUpdate:
      type: object
      properties:
        message:
          type: string
        snapshot:
          $ref: '#/components/schemas/FinancialSnapshot'
      required:
      - message
      - snapshot
    Category:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
      required:
      - name
    CategorySetReturn:
      type: object
      properties:
        accepted:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        rejected:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        updated:
          $ref: '#/components/schemas/Category'
        deleted:
          $ref: '#/components/schemas/Category'
    Expense:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        paid_flag:
          type: boolean
        currency:
          type: string
          maxLength: 3
        is_recurring:
          type: boolean
    ExpensePost:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        paid_flag:
          type: boolean
        currency:
          type: string
          maxLength: 3
        is_recurring:
          type: boolean
      required:
      - amount
      - currency
      - name
    ExpensePut:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        paid_flag:
          type: boolean
        currency:
          type: string
          maxLength: 3
        is_recurring:
          type: boolean
      required:
      - amount
      - currency
      - due_date
      - is_recurring
      - name
      - paid_flag
      - start_date
    ExpenseSetReturn:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        due_date:
          type: string
          format: date
          nullable: true
        start_date:
          type: string
          format: date
          nullable: true
        end_date:
          type: string
          format: date
          nullable: true
        paid_flag:
          type: boolean
        currency:
          type: string
          maxLength: 3
